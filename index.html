<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fabu</title>
<link rel="stylesheet" href="styles.css?v=18">
</head>
<body>

<!-- SVG icon library -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-play" viewBox="0 0 24 24"><path d="M7 4.5v15l13-7.5z"/></symbol>
  <symbol id="i-pause" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></symbol>
  <symbol id="i-stop" viewBox="0 0 24 24"><rect x="5.5" y="5.5" width="13" height="13" rx="1.5"/></symbol>
  <symbol id="i-rec" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/></symbol>
  <symbol id="i-metro" viewBox="0 0 24 24"><path d="M9 3h6l4 17H5L9 3zm3 3v9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 15l5.5-7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="i-undo" viewBox="0 0 24 24"><path d="M8 6L3 11l5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.5 11H15a6 6 0 0 1 0 12h-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  <symbol id="i-redo" viewBox="0 0 24 24"><path d="M16 6l5 5-5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20.5 11H9a6 6 0 0 0 0 12h3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  <symbol id="i-folder" viewBox="0 0 24 24"><path d="M3 6a2 2 0 0 1 2-2h4l2 2.5h8A2 2 0 0 1 21 8.5V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></symbol>
  <symbol id="i-save" viewBox="0 0 24 24"><path d="M5 3h11l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 3v5h7V3M7 21v-7h10v7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></symbol>
  <symbol id="i-export" viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4.5-4.5M12 15l4.5-4.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  <symbol id="i-mixer" viewBox="0 0 24 24"><path d="M6 4v16M12 4v16M18 4v16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><rect x="3.8" y="8" width="4.4" height="3.4" rx="1.2"/><rect x="9.8" y="13" width="4.4" height="3.4" rx="1.2"/><rect x="15.8" y="6" width="4.4" height="3.4" rx="1.2"/></symbol>
  <symbol id="i-piano" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M9 4v10M15 4v10M7.5 14H10.5M13.5 14h3M9 20v-6M15 20v-6" stroke="currentColor" stroke-width="1.6"/></symbol>
  <symbol id="i-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 2.5l1.2 2.7 2.9-.6 1 2.7 2.9.7-.6 2.9 2.1 2.1-2.1 2.1.6 2.9-2.9.7-1 2.7-2.9-.6L12 21.5l-1.2-2.7-2.9.6-1-2.7-2.9-.7.6-2.9L2.5 12l2.1-2.1L4 7l2.9-.7 1-2.7 2.9.6z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></symbol>
  <symbol id="i-help" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M9.5 9.5a2.5 2.5 0 1 1 3.7 2.2c-.9.5-1.2 1-1.2 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="16.8" r="1.1"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></symbol>
  <symbol id="i-x" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  <symbol id="i-zoomin" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M15.5 15.5L21 21M8 10.5h5M10.5 8v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="i-zoomout" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M15.5 15.5L21 21M8 10.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="i-magnet" viewBox="0 0 24 24"><path d="M6 4v7a6 6 0 0 0 12 0V4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M6 4h4v5H6zM14 4h4v5h-4z"/></symbol>
  <symbol id="i-mic" viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0M12 17.5V21M8.5 21h7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="i-note" viewBox="0 0 24 24"><path d="M9 18.5V5l10-2v13.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><ellipse cx="6.5" cy="18.5" rx="2.5" ry="2"/><ellipse cx="16.5" cy="16.5" rx="2.5" ry="2"/></symbol>
  <symbol id="i-trash" viewBox="0 0 24 24"><path d="M4 7h16M9 7V4.5A1.5 1.5 0 0 1 10.5 3h3A1.5 1.5 0 0 1 15 4.5V7M6.5 7l1 13h9l1-13M10 11v5M14 11v5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7.6" r="1.2"/></symbol>
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M4 11l8-7 8 7M6 9.5V20h12V9.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-doc" viewBox="0 0 24 24"><path d="M6 3h8l4 4v14a0 0 0 0 1 0 0H6a0 0 0 0 1 0 0V3z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M13.5 3v4.5H18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></symbol>
  <symbol id="i-auto" viewBox="0 0 24 24"><path d="M3 17c4 0 5-10 9-10s5 7 9 7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="7.5" cy="12.5" r="2"/><circle cx="16" cy="14" r="2"/></symbol>
  <symbol id="i-edit" viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16v4z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M13.5 6.5l4 4" fill="none" stroke="currentColor" stroke-width="1.7"/></symbol>
  <symbol id="i-users" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M16 5.2a3.2 3.2 0 0 1 0 5.6M17 15.2a5.5 5.5 0 0 1 3.5 4.8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></symbol>
</svg>

<div id="dragbar"></div>

<header id="topbar">
  <div class="tb-group">
    <div id="logo" data-tip="Back to home" data-i18n-tip="tip_home"><span class="logo-fab">fab</span><span class="logo-u">u</span></div>
    <button id="btnHome" class="tbtn" data-tip="Home menu" data-i18n-tip="tip_home"><svg class="ic"><use href="#i-home"/></svg></button>
    <input id="projName" value="Untitled" spellcheck="false" data-tip="Project name" data-i18n-tip="tip_project_name">
  </div>

  <div class="tb-group tb-transport">
    <button id="btnPlay" class="tbtn big accent" data-tip="Play or pause (Space)" data-i18n-tip="tip_play">
      <svg class="ic"><use href="#i-play"/></svg></button>
    <button id="btnStop" class="tbtn big" data-tip="Stop (Enter)" data-i18n-tip="tip_stop">
      <svg class="ic"><use href="#i-stop"/></svg></button>
    <button id="btnRec" class="tbtn big rec" data-tip="Record the microphone (R)" data-i18n-tip="tip_record">
      <svg class="ic"><use href="#i-rec"/></svg></button>

    <div id="posDisplay" data-tip="Bar and beat. Click the ruler to move." data-i18n-tip="tip_position">
      <span id="posBars">1.1</span><span id="posTime">0:00.0</span>
    </div>

    <div class="tb-field" data-tip="Tempo. Drag or type." data-i18n-tip="tip_tempo">
      <label>BPM</label>
      <input id="bpmInput" type="number" min="40" max="300" step="1" value="120">
    </div>

    <button id="btnMetro" class="tbtn toggle" data-tip="Metronome (M)" data-i18n-tip="tip_metronome">
      <svg class="ic"><use href="#i-metro"/></svg></button>

    <div class="tb-field" data-tip="Snap to grid" data-i18n-tip="tip_snap">
      <svg class="ic dim"><use href="#i-magnet"/></svg>
      <select id="snapSelect">
        <option value="4" data-i18n="snap_bar">Bar</option>
        <option value="1" selected data-i18n="snap_beat">Beat</option>
        <option value="0.5">1/8</option>
        <option value="0.25">1/16</option>
        <option value="0" data-i18n="snap_off">Off</option>
      </select>
    </div>

    <button id="btnZoomOut" class="tbtn" data-tip="Zoom out" data-i18n-tip="tip_zoom_out"><svg class="ic"><use href="#i-zoomout"/></svg></button>
    <button id="btnZoomIn" class="tbtn" data-tip="Zoom in" data-i18n-tip="tip_zoom_in"><svg class="ic"><use href="#i-zoomin"/></svg></button>
  </div>

  <div class="tb-group">
    <button id="btnUndo" class="tbtn" data-tip="Undo (Cmd Z)" data-i18n-tip="tip_undo"><svg class="ic"><use href="#i-undo"/></svg></button>
    <button id="btnRedo" class="tbtn" data-tip="Redo (Cmd Y)" data-i18n-tip="tip_redo"><svg class="ic"><use href="#i-redo"/></svg></button>
    <div class="tb-sep"></div>
    <button id="btnOpen" class="tbtn" data-tip="Open project (Cmd O)" data-i18n-tip="tip_open"><svg class="ic"><use href="#i-folder"/></svg></button>
    <button id="btnSave" class="tbtn" data-tip="Save project (Cmd S)" data-i18n-tip="tip_save"><svg class="ic"><use href="#i-save"/></svg></button>
    <button id="btnExport" class="tbtn" data-tip="Export song as WAV (Cmd E)" data-i18n-tip="tip_export"><svg class="ic"><use href="#i-export"/></svg></button>
    <div class="tb-sep"></div>
    <button id="btnKeys" class="tbtn toggle" data-tip="Play with your keyboard (K)" data-i18n-tip="tip_keys"><svg class="ic"><use href="#i-piano"/></svg></button>
    <button id="btnMixer" class="tbtn toggle" data-tip="Mixer and EQ (X)" data-i18n-tip="tip_mixer"><svg class="ic"><use href="#i-mixer"/></svg></button>
    <button id="btnJam" class="tbtn toggle" data-tip="Jam together (live multiplayer)" data-i18n-tip="tip_jam"><svg class="ic"><use href="#i-users"/></svg></button>
    <button id="btnSettings" class="tbtn toggle" data-tip="Settings" data-i18n-tip="tip_settings"><svg class="ic"><use href="#i-gear"/></svg></button>
    <button id="btnHelp" class="tbtn toggle" data-tip="Shortcuts (F1)" data-i18n-tip="tip_help"><svg class="ic"><use href="#i-help"/></svg></button>
  </div>
</header>

<main id="workspace">
  <div id="trackArea">
    <div id="headsCol">
      <div id="headsSpacer"></div>
      <div id="trackHeads"></div>
      <div id="addTrackBar">
        <button id="btnAddMidi" class="add-btn" data-tip="Add an instrument track" data-i18n-tip="tip_add_instrument">
          <svg class="ic"><use href="#i-note"/></svg> <span data-i18n="add_instrument">Instrument</span>
        </button>
        <button id="btnAddAudio" class="add-btn" data-tip="Add an audio track" data-i18n-tip="tip_add_audio">
          <svg class="ic"><use href="#i-mic"/></svg> <span data-i18n="add_audio">Audio</span>
        </button>
      </div>
    </div>
    <div id="tlScroll">
      <div id="ruler"></div>
      <div id="lanes">
        <div id="playhead"></div>
        <div id="dropGhost"></div>
      </div>
    </div>
  </div>

  <!-- Floating windows get appended here -->

  <div id="keysPanel" class="hidden">
    <div id="keysInfo">
      <div class="keys-row">
        <span class="ki-label" data-i18n="keys_instrument">Instrument</span>
        <select id="keysTrackSel" data-tip="Track to play" data-i18n-tip="tip_keys_track"></select>
      </div>
      <div class="keys-row">
        <span class="ki-label" data-i18n="keys_octave">Octave</span>
        <button id="octDown" class="mini-btn" data-tip="Octave down (Z)" data-i18n-tip="tip_octave_down">&minus;</button>
        <span id="octLabel">4</span>
        <button id="octUp" class="mini-btn" data-tip="Octave up (X)" data-i18n-tip="tip_octave_up">+</button>
      </div>
      <div class="keys-row">
        <button id="keysRecBtn" class="rec-notes-btn" data-tip="Record what you play (R)" data-i18n-tip="tip_record_notes" data-i18n="record_notes">Record notes</button>
      </div>
      <div class="keys-hint" data-i18n="keys_hint">Middle row = white keys. Top row = black keys.</div>
    </div>
    <div id="pianoKeys"></div>
  </div>
</main>

<div id="countOverlay" class="hidden"><span id="countNum">1</span></div>

<div id="snapCoach" class="hidden">
  <div class="coach-card">
    <div class="coach-title" data-i18n="coach_title">Can't get the specific timing?</div>
    <div class="coach-sub" data-i18n="coach_sub">Change the grid snapping!</div>
    <div class="coach-arrow">&uarr;</div>
  </div>
</div>

<!-- Homescreen -->
<div id="home">
  <div class="home-inner">
    <div class="home-top">
      <div class="home-brand">
        <div class="home-logo"><span class="logo-fab">fab</span><span class="logo-u">u</span></div>
        <div class="home-tag" data-i18n="tagline">make music.</div>
      </div>
      <div class="home-actions">
        <button id="homeNew" class="home-act">
          <svg class="ic"><use href="#i-plus"/></svg>
          <span data-i18n="new_project">New project</span>
        </button>
        <button id="homeContinue" class="home-act ghost hidden">
          <svg class="ic"><use href="#i-undo"/></svg>
          <span data-i18n="home_continue">Continue</span>
        </button>
        <button id="homeOpen" class="home-act ghost">
          <svg class="ic"><use href="#i-folder"/></svg>
          <span data-i18n="open_a_file">Open a file</span>
        </button>
        <button id="homeMp" class="home-act ghost">
          <svg class="ic"><use href="#i-users"/></svg>
          <span data-i18n="mp_title">Multiplayer</span>
        </button>
      </div>
    </div>
    <div class="home-recent">
      <div class="home-recent-head" data-i18n="recent_projects">Recent Projects</div>
      <div id="homeRecentList" class="home-recent-list"></div>
    </div>
  </div>
  <div id="homeLangs"></div>
  <a id="homeKofi" href="https://ko-fi.com/fabioss" target="_blank" rel="noopener" data-tip="Support fabu on Ko-fi">
    <span class="kofi-cup">&#9749;</span><span data-i18n="support_kofi">support fabu</span>
  </a>
</div>

<footer id="statusbar">
  <span id="statusHint" data-i18n="hint_welcome">Drop a sound anywhere, or double-click an instrument lane to add notes.</span>
  <span id="autosaveLabel"></span>
</footer>

<div id="toasts"></div>
<div id="tooltip" class="hidden"></div>

<script src="js/vendor/lame.min.js?v=18"></script>
<script src="js/vendor/WasmMediaEncoder.min.js?v=18"></script>
<script src="js/vendor/ogg.wasm.js?v=18"></script>
<script src="js/util.js?v=18"></script>
<script src="js/state.js?v=18"></script>
<script src="js/audio.js?v=18"></script>
<script src="js/windows.js?v=18"></script>
<script src="js/timeline.js?v=18"></script>
<script src="js/pianoroll.js?v=18"></script>
<script src="js/automation.js?v=18"></script>
<script src="js/sampler.js?v=18"></script>
<script src="js/auth.js?v=18"></script>
<script src="js/app.js?v=18"></script>
<script src="js/sync.js?v=18"></script>
<script src="js/webnudge.js?v=18"></script>
</body>
</html>
